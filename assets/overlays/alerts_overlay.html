<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Kick Alerts Overlay</title>
    <style>
        :root {
            --kick-green: #53fc18;
            --text-light: #ffffff;
        }

        body, html {
            height: 100%; width: 100%;
            margin: 0; padding: 0; overflow: hidden;
            background-color: transparent; /* Mantiene la transparencia para OBS */
            font-family: 'Arial', sans-serif;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- 1. CONTENEDOR BASE --- */
        #alert-container {
            position: relative;
            display: none; /* Controlado por JS */
            align-items: center;
            text-align: center;
            background: rgba(25, 25, 25, 0.85);
            border: 2px solid var(--kick-green);
            border-radius: 16px;
            padding: 20px 40px;
            box-shadow: 0 0 20px rgba(83, 252, 24, 0.4);
            opacity: 0;
            gap: 15px; /* Separación entre imagen y texto */
        }

        /* --- 2. LAYOUTS DINÁMICOS --- */
        .layout-top { flex-direction: column; }
        .layout-left { flex-direction: row; text-align: left; }
        .layout-right { flex-direction: row-reverse; text-align: right; }

        /* --- 3. TIPOGRAFÍA --- */
        .text-wrapper { display: flex; flex-direction: column; justify-content: center; }
        
        .alert-title {
            font-size: 28px; font-weight: 900; text-transform: uppercase;
            letter-spacing: 2px; margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .alert-message {
            color: var(--text-light); font-size: 20px; font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
        
        /* --- 4. MULTIMEDIA --- */
        .alert-icon { font-size: 50px; }
        .alert-image {
            max-width: 150px; max-height: 150px;
            object-fit: contain; border-radius: 8px;
            display: none;
        }

        /* --- 5. ANIMACIONES (KEYFRAMES) --- */
        
        /* A. Pop In (Rebote) */
        @keyframes popIn {
            0% { transform: translateY(50px) scale(0.5); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        @keyframes popOut {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0; }
        }

        /* B. Fade In (Desvanecer) */
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* C. Slide Up (Deslizar) */
        @keyframes slideUpIn {
            0% { transform: translateY(100px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        @keyframes slideUpOut {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="alert-container">
        <img id="alert-image" class="alert-image" src="" alt="Alerta">
        <div id="alert-icon" class="alert-icon">✨</div>
        
        <div class="text-wrapper">
            <div id="alert-title" class="alert-title">Nuevo Seguidor</div>
            <div id="alert-message" class="alert-message">¡Gracias por seguir el canal!</div>
        </div>
    </div>

    <audio id="alert-sound" src="alert.mp3" preload="auto"></audio>

    <script>
        const container = document.getElementById('alert-container');
        const titleEl = document.getElementById('alert-title');
        const messageEl = document.getElementById('alert-message');
        const iconEl = document.getElementById('alert-icon');
        const imgEl = document.getElementById('alert-image');
        const sound = document.getElementById('alert-sound');
        
        let alertQueue = [];
        let isPlaying = false;

        const ICONS = { 'follow': '💚', 'subscription': '👑', 'host': '🚀' };

        function connect() {
            const socket = new WebSocket('ws://127.0.0.1:8081/ws/alerts');
            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'new_alert') {
                    alertQueue.push(data.payload);
                    processQueue();
                }
            };
            socket.onclose = () => setTimeout(connect, 3000);
        }

        function hexToRgba(hex, opacity) {
            let r = parseInt(hex.slice(1, 3), 16),
                g = parseInt(hex.slice(3, 5), 16),
                b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${opacity})`;
        }

        function processQueue() {
            if (isPlaying || alertQueue.length === 0) return;
            isPlaying = true;
            const alertData = alertQueue.shift();

            // --- 1. RESETEAR ANIMACIONES (ESTO ARREGLA EL BUG) ---
            container.style.animation = 'none'; // Quitar animación atascada
            container.style.display = 'flex'; // Volver a mostrar el contenedor
            void container.offsetWidth; // TRUCO JS: Forzar al navegador a reiniciar el ciclo de dibujo

            // --- 2. CONFIGURAR TEXTOS Y COLOR ---
            titleEl.textContent = alertData.title;
            messageEl.textContent = alertData.message;

            const color = (alertData.color && alertData.color.startsWith('#')) ? alertData.color : 'var(--kick-green)';
            container.style.borderColor = color;
            container.style.boxShadow = `0 0 20px ${alertData.color ? hexToRgba(color, 0.4) : 'rgba(83, 252, 24, 0.4)'}`;
            titleEl.style.color = color;

            // --- 3. IMAGEN VS ICONO ---
            if (alertData.image_url && alertData.image_url.trim() !== "") {
                imgEl.src = alertData.image_url;
                imgEl.style.display = 'block';
                iconEl.style.display = 'none';
            } else {
                imgEl.style.display = 'none';
                iconEl.style.display = 'block';
                iconEl.textContent = ICONS[alertData.alert_type] || '✨';
            }

            // --- 4. APLICAR LAYOUT ---
            container.className = ''; // Limpiar layout viejo
            if (alertData.layout_style === "Imagen a la Izquierda") {
                container.classList.add('layout-left');
            } else if (alertData.layout_style === "Imagen a la Derecha") {
                container.classList.add('layout-right');
            } else {
                container.classList.add('layout-top');
            }

            // --- 5. SONIDO DINÁMICO ---
            sound.src = (alertData.sound_url && alertData.sound_url.trim() !== "") ? alertData.sound_url : "alert.mp3";
            sound.volume = 0.5;
            sound.play().catch(e => console.log("Audio omitido", e));

            // --- 6. APLICAR ANIMACIÓN DE ENTRADA ---
            let animOut = "popOut"; // Por defecto
            if (alertData.animation === "Fade In (Desvanecer)") {
                container.style.animation = "fadeIn 0.5s forwards";
                animOut = "fadeOut";
            } else if (alertData.animation === "Slide Up (Deslizar)") {
                container.style.animation = "slideUpIn 0.5s forwards";
                animOut = "slideUpOut";
            } else {
                container.style.animation = "popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards";
            }

            // --- 7. OCULTAR TRAS LA DURACIÓN SELECCIONADA ---
            const durationMs = (alertData.duration || 5) * 1000;
            
            setTimeout(() => {
                // Ejecutar animación de salida dinámica
                container.style.animation = `${animOut} 0.5s forwards`;
                
                // Dar tiempo a la animación para terminar antes de la siguiente
                setTimeout(() => {
                    container.style.display = 'none';
                    isPlaying = false;
                    processQueue();
                }, 500);
            }, durationMs);
        }

        connect();
    </script>
</body>
</html>
